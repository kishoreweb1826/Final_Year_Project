spring.application.name=organic-farm-backend
server.port=8080

# Database Configuration (uses environment variables; add fallback for local development)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1 
spring.datasource.hikari.idle-timeout=10000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ?????????????????????????????????????????????
#  JWT Configuration
# ?????????????????????????????????????????????
app.jwt.secret=${JWT_SECRET:OrganicFarmSuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ?????????????????????????????????????????????
#  File Upload (Farmer Certificates)
# ?????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads/certificates

# ?????????????????????????????????????????????
#  CORS - allow React dev server
# ?????????????????????????????????????????????
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://*.vercel.app,https://final-year-project-pi-eight.vercel.app

# ?????????????????????????????????????????????
#  Logging
# ?????????????????????????????????????????????
logging.level.com.organicfarm=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ?????????????????????????????????????????????
#  Spring Mail (Gmail SMTP)
#  Uses environment variables for credentials
# ?????????????????????????????????????????????
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:kichikumar12@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# ?????????????????????????????????????????????
#  Email Verification Settings
# ?????????????????????????????????????????????
app.verification.otp-expiry-minutes=10
app.verification.resend-cooldown-seconds=60
app.verification.from-email=${MAIL_USERNAME:kichikumar12@gmail.com}
app.verification.from-name=OrganicFarm