
spring.application.name=organic-farm-backend
server.port=8080

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ─────────────────────────────────────────────
#  JWT Configuration
# ─────────────────────────────────────────────
app.jwt.secret=OrganicFarmSuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ─────────────────────────────────────────────
#  File Upload (Farmer Certificates)
# ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads/certificates

# ─────────────────────────────────────────────
#  CORS - allow React dev server
# ─────────────────────────────────────────────
app.cors.allowed-origins=https://final-year-project-git-main-kishore-kumars-projects-1f713d18.vercel.app/

# ─────────────────────────────────────────────
#  Logging
# ─────────────────────────────────────────────
logging.level.com.organicfarm=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ─────────────────────────────────────────────
#  Spring Mail (Gmail SMTP — free)
#  Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME and MAIL_PASSWORD as env variables
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kichikumar12@gmail.com
spring.mail.password=mhzunrkeyjqvdzdb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# ─────────────────────────────────────────────
#  Email Verification Settings
# ─────────────────────────────────────────────
# OTP expires after 10 minutes
app.verification.otp-expiry-minutes=10
# Resend allowed after 60 seconds
app.verification.resend-cooldown-seconds=60
# From address shown in sent emails
app.verification.from-email=kichikumar12@gmail.com
app.verification.from-name=OrganicFarm
