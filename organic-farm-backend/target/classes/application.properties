
spring.application.name=organic-farm-backend
server.port=8080

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ─────────────────────────────────────────────
#  JWT Configuration
# ─────────────────────────────────────────────
app.jwt.secret=OrganicFarmSuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ─────────────────────────────────────────────
#  File Upload (Farmer Certificates)
# ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads/certificates

# ─────────────────────────────────────────────
#  CORS - allow React dev server
# ─────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ─────────────────────────────────────────────
#  Logging
# ─────────────────────────────────────────────
logging.level.com.organicfarm=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
